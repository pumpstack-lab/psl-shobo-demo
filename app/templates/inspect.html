<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>点検入力 | {{ prop['name'] }}</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f0f2f5; }

.topbar {
  background: #c0392b; color: white; padding: 0 16px; height: 52px;
  display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.topbar a { color: white; text-decoration: none; font-size: 13px; opacity: 0.8; }
.topbar .prop-name { font-size: 14px; font-weight: 700; flex: 1; }
.count-badge {
  background: rgba(255,255,255,0.2);
  padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 700;
}

/* 設備タイプ選択タブ */
.type-tabs {
  background: #fff; border-bottom: 2px solid #e8e8e8;
  display: flex; overflow-x: auto; padding: 0 16px; gap: 0;
  position: sticky; top: 52px; z-index: 99;
}
.type-tab {
  padding: 12px 20px; font-size: 13px; font-weight: 600; color: #888;
  text-decoration: none; white-space: nowrap; border-bottom: 3px solid transparent;
  margin-bottom: -2px; transition: color 0.15s;
}
.type-tab.active { color: #c0392b; border-bottom-color: #c0392b; }
.type-tab:hover { color: #c0392b; background: #fff8f8; }

.container { max-width: 900px; margin: 0 auto; padding: 16px; padding-bottom: 100px; }

.info-card {
  background: white; border-radius: 10px; padding: 16px 18px;
  margin-bottom: 14px; box-shadow: 0 1px 6px rgba(0,0,0,0.07);
}
.info-card-title {
  font-size: 12px; font-weight: 700; color: #c0392b;
  text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px;
}
.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.fg { display: flex; flex-direction: column; gap: 3px; }
.fg label { font-size: 11px; font-weight: 600; color: #777; }
.fg input {
  height: 36px; border: 1px solid #ddd; border-radius: 5px;
  padding: 0 10px; font-size: 13px; font-family: inherit;
}
.fg input:focus { outline: none; border-color: #c0392b; }

.ext-section-title {
  font-size: 14px; font-weight: 700; color: #2c3e50; margin: 16px 0 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.add-btn {
  background: white; border: 1.5px dashed #c0392b; color: #c0392b;
  padding: 6px 14px; border-radius: 5px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: inherit;
}
.add-btn:hover { background: #fff0ef; }

.ext-card {
  background: white; border-radius: 10px; margin-bottom: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.07); overflow: hidden;
}
.ext-card-hd {
  background: #2c3e50; color: white; padding: 10px 16px;
  display: flex; align-items: center; gap: 10px;
}
.ext-num { font-size: 15px; font-weight: 700; }
.ext-del {
  margin-left: auto; background: rgba(255,255,255,0.15); border: none;
  color: white; padding: 3px 10px; border-radius: 3px; cursor: pointer;
  font-size: 12px; font-family: inherit;
}
.ext-del:hover { background: rgba(255,0,0,0.3); }
.ext-body { padding: 14px 16px; }
.ext-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.check-group { display: flex; flex-direction: column; gap: 4px; }
.check-group label { font-size: 11px; font-weight: 600; color: #777; }
select.check-sel {
  height: 38px; border: 1px solid #ddd; border-radius: 5px;
  padding: 0 8px; font-size: 13px; font-family: inherit; background: white;
}
select.check-sel:focus { outline: none; border-color: #c0392b; }
select.judgment-sel {
  height: 42px; font-size: 15px; font-weight: 700; text-align: center; border-width: 2px;
}
select.judgment-sel.ok { border-color: #27ae60; color: #27ae60; background: #eafaf1; }
select.judgment-sel.ng { border-color: #c0392b; color: #c0392b; background: #fdf2f2; }
input.check-input {
  height: 38px; border: 1px solid #ddd; border-radius: 5px;
  padding: 0 10px; font-size: 13px; font-family: inherit; width: 100%;
}
input.check-input:focus { outline: none; border-color: #c0392b; }

.submit-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: white; border-top: 1px solid #ddd;
  padding: 12px 16px; box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
  display: flex; gap: 10px; align-items: center; z-index: 200;
}
.submit-btn {
  flex: 1; height: 48px; background: #c0392b; color: white; border: none;
  border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
}
.submit-btn:hover { background: #a93226; }
.submit-sub { font-size: 11px; color: #aaa; }
.ext-count { font-size: 13px; font-weight: 700; color: #2c3e50; }

@media (max-width: 600px) {
  .info-grid { grid-template-columns: 1fr 1fr; }
  .ext-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="/">← 戻る</a>
  <span class="prop-name">{{ prop['name'] }}</span>
  <span class="count-badge" id="topCount">0 件</span>
</div>

<!-- 設備タイプ選択タブ -->
<div class="type-tabs">
  {% for et in equip_types %}
  <a href="/inspect/{{ prop['id'] }}?type={{ et.id }}"
     class="type-tab {% if selected_type == et.id %}active{% endif %}">
    {{ et.name }}
  </a>
  {% endfor %}
</div>

<div class="container">
  <form method="POST" id="mainForm">
    <input type="hidden" name="count" id="countInput" value="0">
    <input type="hidden" name="equipment_type" value="{{ selected_type }}">

    <!-- 点検者情報 -->
    <div class="info-card">
      <div class="info-card-title">▶ 点検情報</div>
      <div class="info-grid">
        <div class="fg">
          <label>点検実施日</label>
          <input type="date" name="inspected_at" id="inspected_at">
        </div>
        <div class="fg">
          <label>点検者氏名</label>
          <input type="text" name="inspector_name" placeholder="消防設備士 氏名">
        </div>
        <div class="fg">
          <label>免状番号</label>
          <input type="text" name="inspector_num" placeholder="第12345号">
        </div>
        <div class="fg">
          <label>点検対象期間（開始）</label>
          <input type="text" name="period_from" placeholder="例）R6.12.1">
        </div>
        <div class="fg">
          <label>点検対象期間（終了）</label>
          <input type="text" name="period_to" placeholder="例）R7.5.31">
        </div>
      </div>
    </div>

    <div class="ext-section-title">
      <span>設備 点検一覧</span>
      <button type="button" class="add-btn" onclick="addCard()">＋ 1件追加</button>
    </div>

    <div id="extList"></div>
  </form>
</div>

<div class="submit-bar">
  <div>
    <div class="ext-count" id="bottomCount">0 件</div>
    <div class="submit-sub">入力完了後に送信</div>
  </div>
  <button type="button" class="submit-btn" onclick="submitForm()">点検票を作成 →</button>
</div>

<script>
const SCHEMA = {{ check_schema_json | safe }};
const fields = SCHEMA.fields || [];
let count = 0;

function addCard() {
  count++;
  const n = count;
  const div = document.createElement('div');
  div.className = 'ext-card';
  div.id = 'card_' + n;

  let fieldsHtml = '';
  fields.forEach(function(f) {
    const name = f.key + '_' + n;
    let input = '';
    if (f.key === 'judgment') {
      input = '<select name="' + name + '" class="check-sel judgment-sel ok" id="jsel_' + n + '" onchange="onJudge(this,' + n + ')">'
        + '<option value="適">適</option><option value="否">否</option></select>';
    } else if (f.type === 'select') {
      input = '<select name="' + name + '" class="check-sel">';
      (f.options || []).forEach(function(o) { input += '<option>' + o + '</option>'; });
      input += '</select>';
    } else {
      input = '<input type="text" name="' + name + '" class="check-input" placeholder="' + (f.placeholder || '') + '">';
    }
    fieldsHtml += '<div class="check-group"><label>' + f.label + '</label>' + input + '</div>';
  });

  div.innerHTML = '<div class="ext-card-hd">'
    + '<span class="ext-num">No.' + n + '</span>'
    + '<button type="button" class="ext-del" onclick="delCard(' + n + ')">削除</button>'
    + '</div>'
    + '<div class="ext-body"><div class="ext-grid">' + fieldsHtml + '</div></div>';

  document.getElementById('extList').appendChild(div);
  updateCount();
}

function delCard(n) {
  const c = document.getElementById('card_' + n);
  if (c) c.remove();
  updateCount();
}

function onJudge(sel, n) {
  sel.className = 'check-sel judgment-sel ' + (sel.value === '適' ? 'ok' : 'ng');
}

function updateCount() {
  const cards = document.querySelectorAll('.ext-card').length;
  document.getElementById('countInput').value = cards;
  document.getElementById('topCount').textContent = cards + ' 件';
  document.getElementById('bottomCount').textContent = cards + ' 件';
  document.querySelectorAll('.ext-card').forEach(function(c, i) {
    const hd = c.querySelector('.ext-num');
    if (hd) hd.textContent = 'No.' + (i + 1);
  });
}

function submitForm() {
  const cards = document.querySelectorAll('.ext-card').length;
  if (cards === 0) { alert('1件以上入力してください。'); return; }
  document.getElementById('mainForm').submit();
}

document.getElementById('inspected_at').value = new Date().toISOString().split('T')[0];
addCard();
</script>
</body>
</html>
